name: ci

on:
  push:
    branches: [main]
    tags: ['v*']      # also gate release tags — caught by gardener obs 2026-05-28-003
  pull_request:
    branches: [main]

jobs:
  test:
    # Run the suite on Linux AND macOS. The codebase invests heavily in BSD/macOS
    # portability (stat -f, date -j, gtimeout, shasum); without a macOS runner
    # those paths are never exercised and a regression ships unseen — exactly the
    # failure mode that shipped a Linux regression in an earlier release.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck
          # bats-core (the maintained fork); the `bats` npm package is abandoned
          git clone https://github.com/bats-core/bats-core.git --depth 1 --branch v1.11.0 /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Homebrew ships current jq, shellcheck and bats-core.
          brew install jq shellcheck bats-core

      - name: Validate JSON manifests
        run: |
          jq empty .claude-plugin/marketplace.json
          jq empty plugins/bonsai/.claude-plugin/plugin.json

      - name: Shellcheck
        run: |
          shellcheck -x plugins/bonsai/lib/*.sh
          shellcheck -x plugins/bonsai/lib/commands/*.sh
          shellcheck -x plugins/bonsai/hooks/*.sh

      - name: Bats unit tests
        run: |
          cd plugins/bonsai
          bats tests/unit

      - name: Bats integration tests
        run: |
          cd plugins/bonsai
          bats tests/integration
