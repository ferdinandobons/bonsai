name: ci

on:
  push:
    branches: [main]
    tags: ['v*']      # also gate release tags — caught by gardener obs 2026-05-28-003
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Bonsai ships to macOS, Linux and Windows (Git Bash). Linux and macOS run
      # the full behavioral suite so a BSD-vs-GNU tool difference (date/stat/shasum)
      # can't slip through — an earlier release shipped exactly such a regression
      # because CI only ran on Linux. Windows runs shellcheck + manifest validation
      # under its own toolchain (and .gitattributes guarantees LF line endings on
      # checkout): the bats suite stubs Unix executables (jq, claude) and assumes
      # coreutils temp-path semantics, which are properties of the test harness, not
      # the plugin — porting that harness to Git Bash is tracked separately.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        # Use bash everywhere — on Windows this is Git Bash, the shell Claude Code
        # runs the plugin's hooks under.
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jq shellcheck

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install jq shellcheck -y

      - name: Install bats-core
        # Only the POSIX platforms run the bats suite (see the matrix note).
        if: runner.os != 'Windows'
        run: |
          # bats-core (the maintained fork); the `bats` npm package is abandoned.
          # bats is pure bash, so we run it straight from the clone via PATH —
          # no privileged install step needed.
          git clone https://github.com/bats-core/bats-core.git --depth 1 --branch v1.11.0 "$RUNNER_TEMP/bats-core"
          echo "$RUNNER_TEMP/bats-core/bin" >> "$GITHUB_PATH"

      - name: Tool versions
        run: |
          # No pipes here: `shell: bash` enables `pipefail`, so `cmd | head -1`
          # could fail the step on SIGPIPE when head closes the pipe early.
          bash --version
          jq --version
          shellcheck --version

      - name: Validate JSON manifests
        run: |
          jq empty .claude-plugin/marketplace.json
          jq empty plugins/bonsai/.claude-plugin/plugin.json

      # Run from plugins/bonsai so shellcheck resolves the `${CLAUDE_PLUGIN_ROOT}`
      # sources as ./lib/*.sh and follows them. From the repo root those paths
      # don't resolve, and shellcheck 0.11.0 (brew/choco on macOS/Windows) then
      # emits SC1091 and fails the step — older 0.9.0 (apt) is more lenient, which
      # is why a Linux-only pipeline never caught it.
      - name: Shellcheck
        working-directory: plugins/bonsai
        run: shellcheck -x lib/*.sh lib/commands/*.sh hooks/*.sh

      - name: Bats unit tests
        # POSIX only: the harness stubs Unix executables and assumes coreutils
        # temp-path behavior (see the matrix note). The lib code these exercise is
        # the same on every platform; Windows verifies it via shellcheck.
        if: runner.os != 'Windows'
        run: |
          cd plugins/bonsai
          bats tests/unit

      # Integration tests drive detached background gardeners (nohup … & disown)
      # and poll for their output with timing-based waits. That timing is
      # nondeterministic under the Windows CI runner; the unit suite already
      # covers the cross-platform-sensitive library code on Windows, so the
      # integration suite runs on the POSIX platforms.
      - name: Bats integration tests
        if: runner.os != 'Windows'
        run: |
          cd plugins/bonsai
          bats tests/integration
